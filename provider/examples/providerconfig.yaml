# Example ProviderConfig for the AAP Crossplane provider.
# Store AAP credentials in a Kubernetes Secret and reference it here.
# Prefer AAP Application Tokens scoped to specific Organizations.
---
apiVersion: aap.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: Secret
    secretRef:
      name: aap-credentials
      namespace: crossplane-system
      key: credentials
# Optional: provider-specific connection settings (if supported by the generated CRD)
#  host: "https://aap.example.com"
#  insecureSkipVerify: false
