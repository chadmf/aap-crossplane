# Example Secret containing AAP credentials for ProviderConfig.
# Create this in the same namespace as the provider (e.g. crossplane-system).
# Prefer an AAP Application Token over username/password (scoped, revocable).
#
# Format: the Terraform AAP provider expects a JSON object with "host" and either
# "token" (recommended) or "username"/"password". Optional: "insecure_skip_verify".
---
apiVersion: v1
kind: Secret
metadata:
  name: aap-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  # Option 1: token-based (recommended; use AAP Application Token)
  credentials: '{"host":"https://aap.example.com","token":"YOUR_AAP_APPLICATION_TOKEN","insecure_skip_verify":false}'
  # Option 2: username/password
  # credentials: '{"host":"https://aap.example.com","username":"admin","password":"changeme","insecure_skip_verify":false}'
