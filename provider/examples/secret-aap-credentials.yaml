# Example Secret containing AAP credentials for ProviderConfig.
# Create this in the same namespace as the provider (e.g. crossplane-system).
# Format of credentials is provider-specific; the Terraform AAP provider typically
# expects host, username, password (or token). Adjust keys to match what the
# generated provider expects (e.g. from the Terraform provider schema).
---
apiVersion: v1
kind: Secret
metadata:
  name: aap-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  # Option 1: token-based (preferred; use AAP Application Token)
  # credentials: '{"host":"https://aap.example.com","token":"YOUR_AAP_TOKEN"}'
  # Option 2: username/password
  credentials: |
    host: https://aap.example.com
    username: ansible
    password: changeme
