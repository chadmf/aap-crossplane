# Example AAP Inventory managed resource.
# Apply after ProviderConfig and Secret are in place.
# API group/version and spec fields will match the CRDs generated by make generate;
# adjust to match the generated Inventory CRD (e.g. aap.crossplane.io/v1beta1).
---
apiVersion: aap.crossplane.io/v1beta1
kind: Inventory
metadata:
  name: example-inventory
spec:
  forProvider:
    name: example-inventory
    organization: 1   # AAP organization ID; or reference a Group MR
  providerConfigRef:
    name: default
  deletionPolicy: Delete
