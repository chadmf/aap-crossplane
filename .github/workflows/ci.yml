# Validate scaffold and build the provider from the template + this scaffold.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck (shell scripts)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          find hack -maxdepth 1 -name '*.sh' -exec shellcheck {} +

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML
        run: yamllint -d relaxed provider/config provider/examples

      - name: Set up Node.js (for markdownlint)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.40.0

      - name: Lint Markdown
        run: markdownlint README.md BUILD.md provider/README.md
        continue-on-error: true

  build:
    name: Build provider
    runs-on: ubuntu-latest
    steps:
      - name: Build provider (binary)
        working-directory: provider-aap
        run: make build
        continue-on-error: true

      - name: Install Podman
        run: |
          sudo apt-get update -qq && sudo apt-get install -y podman

      - name: Build container (Podman)
        env:
          PROVIDER_AAP_DIR: ${{ github.workspace }}/provider-aap
        run: deploy/build-provider-image-podman.sh provider-aap:latest
