# AAP credentials for the Crossplane provider (token-based).
# Do not commit real tokens. Create the secret with an AAP Application Token.
#
# 1. Create an Application Token in AAP:
#    AAP UI → Users → your user → Details → Application Tokens → Create.
#    Or: Settings → Users → select user → Application Tokens.
#    Scope the token to the organizations the provider will manage.
#
# 2. Create the secret (replace <token> and optionally <aap-namespace>, <gateway-service>).
#    AAP 2.5+: use the gateway service; do not use the controller service directly.
#
#   AAP_HOST="http://<gateway-service>.<aap-namespace>.svc.cluster.local"
#   AAP_TOKEN="<your-application-token>"
#   kubectl create secret generic aap-credentials -n crossplane-system \
#     --from-literal=credentials="{\"host\":\"$AAP_HOST\",\"token\":\"$AAP_TOKEN\",\"insecure_skip_verify\":true}" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Example (in-cluster gateway URL for aap-operator namespace):
#   AAP_HOST="http://aap-gateway.aap-operator.svc.cluster.local"
#   kubectl create secret generic aap-credentials -n crossplane-system \
#     --from-literal=credentials="{\"host\":\"$AAP_HOST\",\"token\":\"$AAP_TOKEN\",\"insecure_skip_verify\":true}" \
#     --dry-run=client -o yaml | kubectl apply -f -
# If the Terraform AAP provider uses /api/v2/ and your AAP exposes /api/controller/v2/, set host to include the path: AAP_HOST="http://aap-gateway.aap-operator.svc.cluster.local/api/controller"
#
# Alternative: username/password (e.g. from aap-controller-admin-password secret):
#   AAP_PASS=$(kubectl get secret aap-controller-admin-password -n <aap-namespace> -o jsonpath='{.data.password}' | base64 -d)
#   kubectl create secret generic aap-credentials -n crossplane-system \
#     --from-literal=credentials="{\"host\":\"$AAP_HOST\",\"username\":\"admin\",\"password\":\"$AAP_PASS\",\"insecure_skip_verify\":true}" \
#     --dry-run=client -o yaml | kubectl apply -f -
