# One-off Job to validate connectivity to the AAP API from inside the cluster.
# Uses the AAP gateway (required in AAP 2.5+); API path is /api/controller/v2/.
# Run:
#   kubectl apply -f deploy/validate-aap-api-job.yaml
#   kubectl wait --for=condition=complete job/validate-aap-api -n crossplane-system --timeout=60s
#   kubectl logs job/validate-aap-api -n crossplane-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: validate-aap-api
  namespace: crossplane-system
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: validate
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # AAP 2.5+: use gateway; controller is no longer accessed directly
              HOST="http://aap-gateway.aap-operator.svc.cluster.local"
              API_PATH="/api/controller/v2/"
              echo "Validating AAP API at $HOST$API_PATH ..."
              code=$(curl -s -o /dev/null -w "%{http_code}" -k "$HOST$API_PATH" || echo "000")
              echo "GET $HOST$API_PATH -> HTTP $code"
              if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "401" ]; then
                echo "SUCCESS: AAP API (gateway) is reachable from the cluster."
                exit 0
              fi
              echo "FAIL: Unexpected HTTP $code (ensure AAP gateway is used, not controller service)"
              exit 1
