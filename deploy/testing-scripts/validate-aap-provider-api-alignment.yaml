# Validate aap-credentials against AAP (Terraform ansible/aap discovery + controller v2).
#
# Supports:
#   - host = gateway root, e.g. http://aap-gateway.ns.svc.cluster.local  (GET .../api/)
#   - host ending in /api/gateway  (GET .../api/gateway/api/)
#   - host ending in /api/controller (legacy): direct GET .../api/controller/v2/
#
# Run:
#   kubectl apply -f deploy/testing-scripts/validate-aap-provider-api-alignment.yaml
#   kubectl wait --for=condition=complete job/validate-aap-provider-api -n crossplane-system --timeout=90s
#   kubectl logs job/validate-aap-provider-api -n crossplane-system
#
# Requires: aap-credentials secret in crossplane-system (token or basic auth).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: validate-aap-provider-api
  namespace: crossplane-system
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: validate
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              CRED_FILE="/etc/aap-credentials/credentials"
              if [ ! -f "$CRED_FILE" ]; then
                echo "ERROR: Secret not mounted at $CRED_FILE"
                exit 1
              fi
              RAW=$(cat "$CRED_FILE")
              HOST=$(echo "$RAW" | sed -n 's/.*"host"\s*:\s*"\([^"]*\)".*/\1/p')
              TOKEN=$(echo "$RAW" | sed -n 's/.*"token"\s*:\s*"\([^"]*\)".*/\1/p')
              USER=$(echo "$RAW" | sed -n 's/.*"username"\s*:\s*"\([^"]*\)".*/\1/p')
              PASS=$(echo "$RAW" | sed -n 's/.*"password"\s*:\s*"\([^"]*\)".*/\1/p')
              if [ -z "$HOST" ]; then
                echo "ERROR: Could not parse host from credentials"
                exit 1
              fi
              AUTH=""
              if [ -n "$TOKEN" ]; then
                AUTH="Authorization: Bearer $TOKEN"
              elif [ -n "$USER" ] && [ -n "$PASS" ]; then
                AUTH="Authorization: Basic $(echo -n "$USER:$PASS" | base64 | tr -d '\n')"
              else
                echo "ERROR: Need token or username+password in credentials"
                exit 1
              fi
              HOSTN=$(echo "$HOST" | sed 's:/*$::')
              echo "=== AAP Crossplane / Terraform ansible/aap API check ==="
              echo "AAP host (from secret): $HOSTN"
              echo ""

              # Direct controller v2 (works when host already includes /api/controller or gateway serves it at this path)
              CTRL_DIRECT=$(curl -s -k -o /tmp/cdirect.json -w "%{http_code}" -H "$AUTH" "$HOSTN/api/controller/v2/")
              API_BASE=""

              if [ "$CTRL_DIRECT" = "200" ]; then
                echo "OK: GET .../api/controller/v2/ -> 200 (direct controller path)"
                API_BASE="$HOSTN/api/controller/v2"
              else
                echo "INFO: Direct .../api/controller/v2/ -> HTTP $CTRL_DIRECT (trying Platform Gateway discovery GET .../api/)"
                DISC_CODE=$(curl -s -k -o /tmp/disc.json -w "%{http_code}" -H "$AUTH" "$HOSTN/api/")
                if [ "$DISC_CODE" != "200" ]; then
                  echo "FAIL: GET $HOSTN/api/ -> HTTP $DISC_CODE"
                  echo "  Fix host: use gateway root (e.g. http://aap-gateway.<ns>.svc.cluster.local) or base ending in /api/gateway."
                  exit 1
                fi
                echo "OK: GET $HOSTN/api/ -> 200 (Terraform provider discovery; supports /api/gateway base paths)"
                CTRL_LINK=$(sed -n 's/.*"controller"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/disc.json | head -1)
                if [ -z "$CTRL_LINK" ]; then
                  echo "FAIL: Discovery JSON missing apis.controller"
                  exit 1
                fi
                if echo "$CTRL_LINK" | grep -q '^https\?://'; then
                  SECOND_URL="$CTRL_LINK"
                else
                  SECOND_URL="$HOSTN$CTRL_LINK"
                fi
                curl -s -k -o /tmp/v2root.json -H "$AUTH" "$SECOND_URL" || true
                V2=$(sed -n 's/.*"current_version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/v2root.json | head -1)
                if [ -z "$V2" ]; then
                  echo "FAIL: Could not read current_version from controller discovery at $SECOND_URL"
                  exit 1
                fi
                if echo "$V2" | grep -q '^https\?://'; then
                  API_BASE=$(echo "$V2" | sed 's:/*$::')
                else
                  API_BASE="$HOSTN$(echo "$V2" | sed 's:/*$::')"
                fi
                echo "OK: Controller API base (from discovery): $API_BASE"
              fi
              echo ""

              ROOT=$(curl -s -k -H "$AUTH" "$API_BASE/" || echo "{}")
              echo "--- Controller v2 root (resource keys) ---"
              echo "$ROOT" | tr ',' '\n' | grep -oE '"[a-z_]+"' | tr -d '"' | sort -u || true
              echo ""

              echo "--- Managed resource endpoints ---"
              check() {
                path=$1
                code=$(curl -s -k -o /tmp/out -w "%{http_code}" -H "$AUTH" "${API_BASE}${path}")
                if [ "$code" = "200" ]; then
                  count=$(grep -oE '"count":[[:space:]]*[0-9]*' /tmp/out | head -1)
                  echo "  OK   ${path} -> $code $count"
                else
                  echo "  ---  ${path} -> HTTP $code"
                fi
              }
              check "/inventories/"
              check "/hosts/"
              check "/groups/"
              check "/jobs/"
              check "/workflow_jobs/"
              check "/job_templates/"
              check "/workflow_job_templates/"
              check "/organizations/"
              echo ""

              GW_CODE=$(curl -s -k -o /dev/null -w "%{http_code}" -H "$AUTH" "$HOSTN/api/gateway/v1/status/" 2>/dev/null || echo "000")
              if [ "$GW_CODE" = "200" ] || [ "$GW_CODE" = "404" ]; then
                echo "INFO: GET .../api/gateway/v1/status/ -> HTTP $GW_CODE (gateway segment; optional)"
              fi
              echo ""
              echo "--- Provider CRDs -> controller v2 ---"
              echo "  inventory / host / group / job / workflowjob -> under $API_BASE"
              echo "Validation complete."
          volumeMounts:
            - name: creds
              readOnly: true
              mountPath: /etc/aap-credentials
      volumes:
        - name: creds
          secret:
            secretName: aap-credentials
            optional: false
            items:
              - key: credentials
                path: credentials
